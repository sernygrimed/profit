<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商利润自动核算工具 - 智能推演版</title>
    <!-- 引入 Tailwind CSS 框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 用于在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        /* 隐藏数字输入框的上下箭头 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 小组件：复用区间输入框 (支持多色彩主题)
        const RangeInput = ({ label, minVal, setMin, maxVal, setMax, suffix, step, color = 'blue', minSubtext, maxSubtext }) => {
            // 定义多套专属颜色主题
            const themes = {
                blue: { bg: 'bg-blue-50', border: 'border-blue-300', focus: 'focus:ring-blue-500', btnBg: 'bg-blue-100', btnHover: 'hover:bg-blue-200', text: 'text-blue-700', btnBorder: 'border-blue-200' },
                emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', focus: 'focus:ring-emerald-500', btnBg: 'bg-emerald-100', btnHover: 'hover:bg-emerald-200', text: 'text-emerald-700', btnBorder: 'border-emerald-200' },
                purple: { bg: 'bg-purple-50', border: 'border-purple-300', focus: 'focus:ring-purple-500', btnBg: 'bg-purple-100', btnHover: 'hover:bg-purple-200', text: 'text-purple-700', btnBorder: 'border-purple-200' },
                rose: { bg: 'bg-rose-50', border: 'border-rose-300', focus: 'focus:ring-rose-500', btnBg: 'bg-rose-100', btnHover: 'hover:bg-rose-200', text: 'text-rose-700', btnBorder: 'border-rose-200' },
                cyan: { bg: 'bg-cyan-50', border: 'border-cyan-300', focus: 'focus:ring-cyan-500', btnBg: 'bg-cyan-100', btnHover: 'hover:bg-cyan-200', text: 'text-cyan-700', btnBorder: 'border-cyan-200' },
                amber: { bg: 'bg-amber-50', border: 'border-amber-300', focus: 'focus:ring-amber-500', btnBg: 'bg-amber-100', btnHover: 'hover:bg-amber-200', text: 'text-amber-700', btnBorder: 'border-amber-200' },
                indigo: { bg: 'bg-indigo-50', border: 'border-indigo-300', focus: 'focus:ring-indigo-500', btnBg: 'bg-indigo-100', btnHover: 'hover:bg-indigo-200', text: 'text-indigo-700', btnBorder: 'border-indigo-200' },
            };
            const theme = themes[color] || themes.blue;

            const adjustMin = (amount) => {
                let n = parseFloat(minVal);
                if (isNaN(n)) n = 0; 
                setMin(Number((n + amount).toFixed(4)).toString());
            };

            const adjustMax = (amount) => {
                let n = parseFloat(maxVal);
                if (isNaN(n)) n = 0;
                setMax(Number((n + amount).toFixed(4)).toString());
            };

            return (
                <div className="flex flex-col">
                    <label className={`text-xs font-bold mb-1 ${theme.text}`}>{label}</label>
                    <div className="grid grid-cols-[1fr_auto_1fr] items-start gap-1.5">
                        
                        {/* 左侧：下限输入与控制 */}
                        <div className="flex flex-col gap-1.5">
                            <div className="flex items-center gap-1">
                                <input type="number" className={`w-full min-w-0 p-1.5 border rounded-lg focus:ring-1 outline-none text-sm text-center ${theme.border} ${theme.focus} ${theme.bg}`} placeholder="下限" value={minVal} onChange={(e) => setMin(e.target.value)} />
                                {suffix && <span className={`text-xs font-bold shrink-0 ${theme.text} opacity-80`}>{suffix}</span>}
                            </div>
                            {minSubtext && <div className={`text-[10px] text-center -mt-0.5 ${theme.text} opacity-80`}>{minSubtext}</div>}
                            {step && (
                                <div className="flex gap-1 mt-4">
                                    <button onClick={() => adjustMin(-step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder}`}>-</button>
                                    <button onClick={() => adjustMin(step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder}`}>+</button>
                                </div>
                            )}
                        </div>

                        {/* 中间分隔符 (保持居中) */}
                        <div className="pt-2 flex items-center h-[34px]">
                            <span className={`font-bold shrink-0 ${theme.text} opacity-50`}>-</span>
                        </div>

                        {/* 右侧：上限输入与控制 */}
                        <div className="flex flex-col gap-1.5">
                            <div className="flex items-center gap-1">
                                <input type="number" className={`w-full min-w-0 p-1.5 border rounded-lg focus:ring-1 outline-none text-sm text-center ${theme.border} ${theme.focus} ${theme.bg}`} placeholder="上限" value={maxVal} onChange={(e) => setMax(e.target.value)} />
                                {suffix && <span className={`text-xs font-bold shrink-0 ${theme.text} opacity-80`}>{suffix}</span>}
                            </div>
                            {maxSubtext && <div className={`text-[10px] text-center -mt-0.5 ${theme.text} opacity-80`}>{maxSubtext}</div>}
                            {step && (
                                <div className="flex gap-1 mt-4">
                                    <button onClick={() => adjustMax(-step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder}`}>-</button>
                                    <button onClick={() => adjustMax(step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder}`}>+</button>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        function App() {
            const [pasteData, setPasteData] = useState('');
            const [margin, setMargin] = useState('');
            const [returnRate, setReturnRate] = useState('');
            const [newCustRate, setNewCustRate] = useState('100'); // 新增：新客占比，默认 100%
            const [monthlyFixedCost, setMonthlyFixedCost] = useState('');
            
            const [extDays, setExtDays] = useState('');
            const [extDateStr, setExtDateStr] = useState('');
            const [extPvMin, setExtPvMin] = useState('');
            const [extPvMax, setExtPvMax] = useState('');
            const [extCvrMin, setExtCvrMin] = useState('');
            const [extCvrMax, setExtCvrMax] = useState('');
            const [extTxnMin, setExtTxnMin] = useState('');
            const [extTxnMax, setExtTxnMax] = useState('');
            const [extAovMin, setExtAovMin] = useState('');
            const [extAovMax, setExtAovMax] = useState('');
            const [extClickMin, setExtClickMin] = useState('');
            const [extClickMax, setExtClickMax] = useState('');
            const [extPpcMin, setExtPpcMin] = useState('');
            const [extPpcMax, setExtPpcMax] = useState('');
            
            // 新增：快捷推算状态与原始提取数据缓存
            const [dailyRev, setDailyRev] = useState('');
            const [dailyPaid, setDailyPaid] = useState('');
            const [rawParsed, setRawParsed] = useState(null);

            const [analyzedData, setAnalyzedData] = useState(null);

            const adjustSingle = (setter, current, amount) => {
                const n = parseFloat(current);
                if (isNaN(n)) {
                    setter(amount.toString());
                } else {
                    setter(Number((n + amount).toFixed(4)).toString());
                }
            };

            const formatWan = (val) => {
                if (val === '' || val === null || val === undefined) return '';
                const num = parseFloat(val);
                if (isNaN(num)) return '';
                return parseFloat((num / 10000).toFixed(4)).toString();
            };

            // 智能提取数据逻辑
            useEffect(() => {
                if (!pasteData.trim()) return;
                const dateRegex = /(\d{4}[-/]\d{1,2}[-/]\d{1,2})\s*(?:至|-|~)\s*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/g;
                let match;
                let totalDays = 0;
                let dateStrings = [];
                while ((match = dateRegex.exec(pasteData)) !== null) {
                    dateStrings.push(`${match[1]} 至 ${match[2]}`);
                    const start = new Date(match[1]);
                    const end = new Date(match[2]);
                    const days = Math.round((end - start) / 86400000) + 1;
                    totalDays += days;
                }

                const extractRange = (keywords) => {
                    const lines = pasteData.split('\n');
                    let targetLine = '';
                    for (const line of lines) {
                        if (keywords.some((kw) => line.includes(kw))) {
                            targetLine = line;
                            break;
                        }
                    }
                    if (!targetLine) return ['', ''];
                    const matches = targetLine.match(/[\d\.,]+[万%]?(?:\s*[-~至]\s*[\d\.,]+[万%]?)?/g);
                    if (!matches) return ['', ''];
                    let valStr = matches[matches.length - 1]; 
                    const isPercentContext = targetLine.includes('%') || keywords.some(k => k.includes('率') || k.includes('占比'));
                    const parseNum = (s) => {
                        if (!s) return '';
                        let numStr = s.replace(/,/g, '').trim();
                        const hasPercent = numStr.includes('%');
                        numStr = numStr.replace(/%/g, '');
                        let num = parseFloat(numStr);
                        if (isNaN(num)) return '';
                        if (s.includes('万')) num *= 10000;
                        if (hasPercent || (isPercentContext && !s.includes('万'))) {
                            if (!(num > 100 && !hasPercent)) num /= 100;
                        }
                        return num;
                    };
                    if (valStr.includes('-') || valStr.includes('至') || valStr.includes('~')) {
                        const splitChar = valStr.includes('-') ? '-' : valStr.includes('至') ? '至' : '~';
                        const bounds = valStr.split(splitChar).map((s) => s.trim());
                        if (bounds[1] && bounds[1].includes('万') && !bounds[0].includes('万')) bounds[0] += '万';
                        if (bounds[1] && bounds[1].includes('%') && !bounds[0].includes('%')) bounds[0] += '%';
                        let min = parseNum(bounds[0]);
                        let max = parseNum(bounds[1]);
                        if (min !== '' && max !== '' && min > max) [min, max] = [max, min];
                        return [min, max];
                    } else {
                        const val = parseNum(valStr);
                        return [val, val];
                    }
                };

                const rawPV = extractRange(['整体IPV', '整体PV', 'IPV', 'PV', '总流量', '访客']);
                const rawCVR = extractRange(['整体成交转化率', '成交转化率', '转化率', 'CVR']);
                const rawTxns = extractRange(['整体成交笔数', '成交笔数', '总笔数', '销量', '订单量']);
                const rawAOV = extractRange(['整体笔单价', '整体客单价', '笔单价', '客单价', 'AOV']);
                const clicks = extractRange(['付费点击量', '点击量', '付费点击', '推广点击']);
                const ppc = extractRange(['单次点击成本', 'PPC', '点击成本', '平均点击花费']);
                const rawNewCust = extractRange(['新客成交占比', '新客占比']); // 新增：提取新客占比

                const parsed = {
                    days: totalDays || '',
                    dateStr: dateStrings.join(', '),
                    pv: [formatWan(rawPV[0]), formatWan(rawPV[1])],
                    cvr: [rawCVR[0] !== '' ? +(rawCVR[0] * 100).toFixed(4) : '', rawCVR[1] !== '' ? +(rawCVR[1] * 100).toFixed(4) : ''],
                    txn: [formatWan(rawTxns[0]), formatWan(rawTxns[1])],
                    aov: [rawAOV[0] !== '' ? rawAOV[0] : '', rawAOV[1] !== '' ? rawAOV[1] : ''],
                    click: [formatWan(clicks[0]), formatWan(clicks[1])],
                    ppc: [ppc[0] !== '' ? ppc[0] : '', ppc[1] !== '' ? ppc[1] : ''],
                    newCust: rawNewCust[0] !== '' ? parseFloat(((rawNewCust[0] + rawNewCust[1]) / 2 * 100).toFixed(2)).toString() : '100' // 计算均值
                };
                setRawParsed(parsed);

                setExtDays(parsed.days);
                setExtDateStr(parsed.dateStr);
                setExtPvMin(parsed.pv[0]); setExtPvMax(parsed.pv[1]);
                setExtCvrMin(parsed.cvr[0]); setExtCvrMax(parsed.cvr[1]);
                setExtAovMin(parsed.aov[0]); setExtAovMax(parsed.aov[1]);
                setExtPpcMin(parsed.ppc[0]); setExtPpcMax(parsed.ppc[1]);
                
                // 自动填充新客占比
                if (rawNewCust[0] !== '') {
                    setNewCustRate(parsed.newCust);
                }
                
                // 仅当快捷输入为空时，直接使用提取的笔数和点击量
                if (!dailyRev) { setExtTxnMin(parsed.txn[0]); setExtTxnMax(parsed.txn[1]); }
                if (!dailyPaid) { setExtClickMin(parsed.click[0]); setExtClickMax(parsed.click[1]); }
            }, [pasteData]);

            // 新增：快捷推算联动 - 日均营业额 -> 成交总笔数
            useEffect(() => {
                if (dailyRev !== '' && extDays !== '') {
                    let aMin = parseFloat(extAovMin);
                    let aMax = parseFloat(extAovMax);
                    if (isNaN(aMin)) aMin = aMax;
                    if (isNaN(aMax)) aMax = aMin;
                    if (!isNaN(aMin) && aMin > 0 && !isNaN(aMax) && aMax > 0) {
                        const rev = parseFloat(dailyRev) * parseFloat(extDays);
                        let t1 = rev / aMin / 10000;
                        let t2 = rev / aMax / 10000;
                        setExtTxnMin(parseFloat(Math.min(t1, t2).toFixed(4)).toString());
                        setExtTxnMax(parseFloat(Math.max(t1, t2).toFixed(4)).toString());
                    }
                } else if (rawParsed && dailyRev === '') {
                    // 清空时恢复自动提取的数据
                    setExtTxnMin(rawParsed.txn[0]);
                    setExtTxnMax(rawParsed.txn[1]);
                }
            }, [dailyRev, extAovMin, extAovMax, extDays, rawParsed]);

            // 新增：快捷推算联动 - 日推广付费 -> 付费点击总量
            useEffect(() => {
                if (dailyPaid !== '' && extDays !== '') {
                    let pMin = parseFloat(extPpcMin);
                    let pMax = parseFloat(extPpcMax);
                    if (isNaN(pMin)) pMin = pMax;
                    if (isNaN(pMax)) pMax = pMin;
                    if (!isNaN(pMin) && pMin > 0 && !isNaN(pMax) && pMax > 0) {
                        const paid = parseFloat(dailyPaid) * parseFloat(extDays);
                        let c1 = paid / pMin / 10000;
                        let c2 = paid / pMax / 10000;
                        setExtClickMin(parseFloat(Math.min(c1, c2).toFixed(4)).toString());
                        setExtClickMax(parseFloat(Math.max(c1, c2).toFixed(4)).toString());
                    }
                } else if (rawParsed && dailyPaid === '') {
                    // 清空时恢复自动提取的数据
                    setExtClickMin(rawParsed.click[0]);
                    setExtClickMax(rawParsed.click[1]);
                }
            }, [dailyPaid, extPpcMin, extPpcMax, extDays, rawParsed]);

            // 实时核算逻辑
            useEffect(() => {
                const days = parseFloat(extDays) || 0;
                if (days <= 0) { setAnalyzedData(null); return; }
                const getVal = (minState, maxState, multiplier = 1) => {
                    const parseVal = (v) => {
                        if (v === '' || v === null || v === undefined) return NaN;
                        return parseFloat(v) * multiplier;
                    };
                    let min = parseVal(minState); let max = parseVal(maxState);
                    if (isNaN(min) && isNaN(max)) return [0, 0];
                    if (isNaN(min)) min = max; if (isNaN(max)) max = min;
                    if (min > max) [min, max] = [max, min];
                    return [min, max];
                };

                const pv = getVal(extPvMin, extPvMax, 10000);
                const cvr = getVal(extCvrMin, extCvrMax, 0.01);
                const txns = getVal(extTxnMin, extTxnMax, 10000);
                const click = getVal(extClickMin, extClickMax, 10000);
                const aov = getVal(extAovMin, extAovMax, 1);
                const ppc = getVal(extPpcMin, extPpcMax, 1);

                if (aov[1] === 0) { setAnalyzedData(null); return; }

                let deducedTxnMin = txns[0], deducedTxnMax = txns[1], isCrossValidated = false;
                if (pv[1] > 0 && cvr[1] > 0 && txns[1] > 0) {
                    const calcMin = pv[0] * cvr[0], calcMax = pv[1] * cvr[1];
                    const overlapMin = Math.max(txns[0], calcMin), overlapMax = Math.min(txns[1], calcMax);
                    if (overlapMin <= overlapMax && overlapMax > 0) {
                        deducedTxnMin = overlapMin; deducedTxnMax = overlapMax; isCrossValidated = true;
                    }
                }
                if (txns[1] === 0 && pv[1] > 0 && cvr[1] > 0) {
                    deducedTxnMin = pv[0] * cvr[0]; deducedTxnMax = pv[1] * cvr[1]; isCrossValidated = true;
                }

                const dailyFixedCost = (parseFloat(monthlyFixedCost) || 0) / 30;
                const totalFixedCost = dailyFixedCost * days;

                const calculateTier = (txnVal, aovVal, clickVal, ppcVal, cvrVal) => {
                    const marginRatio = (parseFloat(margin) || 0) / 100;
                    const returnRatio = (parseFloat(returnRate) || 0) / 100;
                    // 新增：提取新客占比
                    const ncr = newCustRate === '' ? 100 : parseFloat(newCustRate);
                    const newCustRatio = ncr / 100;
                    
                    const totalRevenue = txnVal * aovVal;
                    const totalActualRevenue = totalRevenue - totalRevenue * returnRatio;
                    const totalGrossProfit = totalActualRevenue * marginRatio;
                    const totalPaid = clickVal * ppcVal;
                    const totalNetProfit = totalGrossProfit - totalPaid - totalFixedCost;

                    // 实际付费转化率
                    const adTxns = clickVal * cvrVal; 
                    const paidCvr = clickVal > 0 ? (adTxns / clickVal) * 100 : 0;
                    
                    const dTxns = txnVal / days, dRev = totalRevenue / days, dAct = totalActualRevenue / days, dPaid = totalPaid / days, dNet = totalNetProfit / days;
                    
                    // 指标计算
                    const roi = totalPaid > 0 ? (totalRevenue / totalPaid) : 0; // 1. 全店中位ROI (毛ROI)
                    const netRoi = totalPaid > 0 ? (totalActualRevenue / totalPaid) : 0; // 2. 全店净有效ROI (GMV*(1-退货率)/付费)
                    
                    // 3. 广告净ROI (成交总笔数 × 新客占比 × 客单价 × (1 − 退货率) × 毛利率) ÷ 广告总花费
                    const adNetRoi = totalPaid > 0 ? (txnVal * newCustRatio * aovVal * (1 - returnRatio) * marginRatio) / totalPaid : 0; 
                    
                    const maxBreakevenPpc = aovVal * marginRatio * (1 - returnRatio) * cvrVal;
                    const breakevenRoi = (marginRatio > 0 && returnRatio < 1) ? 1 / (marginRatio * (1 - returnRatio)) : 0;

                    return {
                        aov: aovVal, totalTxns: txnVal, totalRevenue, totalActualRevenue, totalPaid, totalNetProfit,
                        dailyTxns: dTxns, dailyRevenue: dRev, dailyActualRevenue: dAct, dailyPaid: dPaid, dailyNetProfit: dNet,
                        monthlyTxns: dTxns * 30, monthlyRevenue: dRev * 30, monthlyActualRevenue: dAct * 30, monthlyPaid: dPaid * 30, monthlyNetProfit: dNet * 30,
                        roi, netRoi, adNetRoi, maxBreakevenPpc, breakevenRoi, paidCvr
                    };
                };

                const conservative = calculateTier(deducedTxnMin, aov[0], click[1] || click[0], ppc[1] || ppc[0], cvr[0]);
                const optimistic = calculateTier(deducedTxnMax, aov[1], click[0], ppc[0], cvr[1]);
                const steady = calculateTier((deducedTxnMin + deducedTxnMax) / 2, (aov[0] + aov[1]) / 2, (click[0] + click[1]) / 2, (ppc[0] + ppc[1]) / 2, (cvr[0] + cvr[1]) / 2);

                // --- 实时同频诊断算法 (融合月度净利润全局视角) ---
                const marginRatio = (parseFloat(margin) || 0) / 100;
                const returnRatio = (parseFloat(returnRate) || 0) / 100;
                const currentRoi = steady.roi;
                const currentBreakevenRoi = steady.breakevenRoi;
                
                let actualPpc = (parseFloat(extPpcMin) + parseFloat(extPpcMax)) / 2;
                if (isNaN(actualPpc)) actualPpc = parseFloat(extPpcMin) || 0;
                const maxPpc = steady.maxBreakevenPpc;
                
                let actualCvr = (parseFloat(extCvrMin) + parseFloat(extCvrMax)) / 2;
                if (isNaN(actualCvr)) actualCvr = parseFloat(extCvrMin) || 0;
                
                const effectiveMargin = marginRatio * (1 - returnRatio) * 100;
                
                // 提取月度推演的核心终局指标
                const steadyMonthlyNet = steady.monthlyNetProfit;
                const consMonthlyNet = conservative.monthlyNetProfit;
                const steadyMonthlyRev = steady.monthlyRevenue;
                const netProfitMargin = steadyMonthlyRev > 0 ? (steadyMonthlyNet / steadyMonthlyRev) * 100 : 0;
                
                // 判断是否盈利（从单纯看变动成本的ROI，升级为看包含固定成本的最终月净利）
                const isVariableProfitable = currentRoi >= currentBreakevenRoi && currentBreakevenRoi > 0;
                const isNetProfitable = steadyMonthlyNet > 0;
                const isMicroProfit = isNetProfitable && (netProfitMargin < 5 || consMonthlyNet < 0);
                
                let profitStatus = !isNetProfitable ? "实质亏损" : (isMicroProfit ? "微利" : "盈利");
                
                // 评判健康评级 (结合净利润规模与抗风险能力)
                let grade = 'C';
                if (!isNetProfitable) grade = 'C';
                else if (isMicroProfit) grade = 'B';
                else if (netProfitMargin >= 15 && consMonthlyNet >= 0) grade = 'A+';
                else grade = 'A';
                
                // 放大策略
                let scaling = grade === 'C' ? '禁止放大' : (grade === 'B' ? '需优化后放大' : '可进一步放大');
                
                // 1. 核心风险点提取
                let allRisks = [];
                if (!isVariableProfitable) allRisks.push("ROI击穿保本线(广告买量直接亏本)");
                if (isVariableProfitable && !isNetProfitable) allRisks.push("总体毛利盘太小，无法摊销全店固定成本");

                const riskStr = allRisks.slice(0, 3).join("；");
                
                // 2. 多维样本分析结论
                let mdaLines = [];
                if (actualPpc > 0 && maxPpc > 0) {
                    if (actualPpc < maxPpc * 0.5) mdaLines.push("【流量获取】极佳：引流成本远低于红线，流量获取的容错率极高，具备强势抢量的基础。");

                    else mdaLines.push("【流量获取】良好：引流成本在合理区间内，仍有一定的出价与调控空间。");
                }
                if (actualCvr >= 2.0) mdaLines.push("【承接效率】优秀：店铺前端承接能力强劲，进店流量的利用率处于行业较高水平。");
                else if (actualCvr > 0) mdaLines.push("【承接效率】疲软：大量付费买来的访客被白白流失，详情页或买家秀可能存在致命信任卡点。");
                
                if (!isNetProfitable) {
                    mdaLines.push(`【终局净利】严重恶化：推算月度净损额扩大，模型处于持续失血状态，亟需重构成本结构。`);
                } else if (netProfitMargin < 5) {
                    mdaLines.push(`【终局净利】微薄：推算全店净利率仅 ${netProfitMargin.toFixed(1)}%，处于“赚流水不赚钱”的给平台打工状态。`);

                    mdaLines.push(`【终局净利】丰厚：推算全店净利率达 ${netProfitMargin.toFixed(1)}%，整体生意底盘稳固，拥有充足的利润安全垫。`);

                    if (returnRatio >= 0.3) advicesLines.push("狠抓退货率：深度分析售后原因（尺码/色差/材质），优化预期管理与发货前质检，降低非质量退货。");
                    if (actualCvr < 1.5) advicesLines.push("提升转化率：诊断流失链路，重构主图卖点排序，利用客服主动催付或大额满减券进行逼单。");
                } else {
                    advicesLines.push("稳步拓流：在确保月净利空间充足的前提下，尝试以5%-10%的幅度逐步提升日限额，测试流量天花板。");

                                                                <div className="pt-2 mt-2 border-t border-dashed border-gray-200/70 space-y-1 text-xs">
                                                                    <div className="flex justify-between"><span>日营业额:</span><span>{formatCurrency(data.dailyRevenue)}</span></div>
                                                                    <div className="flex justify-between"><span>日实际成交:</span><span>{formatCurrency(data.dailyActualRevenue)}</span></div>
                                                                    <div className="flex justify-between text-red-500"><span>日推广费:</span><span>{formatCurrency(data.dailyPaid)}</span></div>
                                                                    <div className="flex justify-between"><span>日净利润:</span><span className={data.dailyNetProfit >= 0 ? 'text-green-600' : 'text-red-500'}>{formatCurrency(data.dailyNetProfit)}</span></div>
                                                                </div>
                                                                <div className="flex justify-between items-center pt-3 border-t border-gray-200/50 mt-2">
                                                                    <span className="text-gray-900 font-bold">月净利润:</span>
                                                                    <span className={`font-black text-lg ${isProfit ? 'text-green-600' : 'text-red-600'}`}>{formatCurrency(data.monthlyNetProfit)}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </section>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
